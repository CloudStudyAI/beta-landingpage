version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "DB_HOST=$DB_HOST" >> .env.production
        - echo "DB_PORT=$DB_PORT" >> .env.production
        - echo "DB_NAME=$DB_NAME" >> .env.production
        - echo "DB_USER=$DB_USER" >> .env.production
        - echo "DB_PASSWORD=$DB_PASSWORD" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
